services:
  postgres:
    image: postgres:16
    container_name: frota_pg
    environment:
      POSTGRES_DB: frota
      POSTGRES_USER: frota
      POSTGRES_PASSWORD: frota
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frota"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
